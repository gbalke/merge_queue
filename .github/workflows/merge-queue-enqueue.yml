name: "Merge Queue"

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  checks: read
  actions: write

concurrency:
  group: merge-queue
  cancel-in-progress: false

jobs:
  enqueue:
    if: github.event.label.name == 'queue'
    runs-on: ubuntu-latest
    outputs:
      batch: ${{ steps.discover.outputs.batch }}
      batch_count: ${{ steps.discover.outputs.batch_count }}
      branch: ${{ steps.create-batch.outputs.branch }}
      ci_run_url: ${{ steps.ci.outputs.run_url }}
    steps:
      - name: Discover stack and validate
        id: discover
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const labeledPr = context.payload.pull_request;

            // --- 1. Check for existing batch ---
            const { data: refs } = await github.rest.git.listMatchingRefs({
              owner, repo, ref: 'heads/mq/'
            });
            if (refs.length > 0) {
              const branch = refs[0].ref.replace('refs/heads/', '');
              await github.rest.issues.createComment({
                owner, repo, issue_number: labeledPr.number,
                body: `**Merge Queue:** A batch is already in progress (\`${branch}\`). Will process when it completes. Re-add the \`queue\` label to retry.`
              });
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: labeledPr.number, name: 'queue'
              }).catch(() => {});
              core.setFailed('Batch already in progress');
              return;
            }

            // --- 2. Build PR dependency graph ---
            const { data: allOpen } = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 100
            });

            const byHead = {};
            const byBase = {};
            for (const pr of allOpen) {
              byHead[pr.head.ref] = pr;
              byBase[pr.base.ref] = byBase[pr.base.ref] || [];
              byBase[pr.base.ref].push(pr);
            }

            // --- 3. Find the full stack containing the labeled PR ---
            let root = labeledPr;
            const defaultBranch = context.payload.repository.default_branch;
            while (root.base.ref !== defaultBranch && byHead[root.base.ref]) {
              root = byHead[root.base.ref];
            }

            if (root.base.ref !== defaultBranch) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: labeledPr.number,
                body: `**Merge Queue:** Cannot find root of stack. PR #${root.number} targets \`${root.base.ref}\` which is not \`${defaultBranch}\` and no open PR has that as its head branch.`
              });
              core.setFailed('Cannot find stack root');
              return;
            }

            const chain = [root];
            let cursor = root;
            while (byBase[cursor.head.ref] && byBase[cursor.head.ref].length > 0) {
              const children = byBase[cursor.head.ref];
              if (children.length > 1) {
                core.warning(`Multiple PRs target ${cursor.head.ref}: ${children.map(p => '#' + p.number).join(', ')}. Using #${children[0].number}.`);
              }
              chain.push(children[0]);
              cursor = children[0];
            }

            console.log(`Full stack: ${chain.map(p => '#' + p.number + ' (' + p.head.ref + ')').join(' -> ')}`);

            // --- 4. Build contiguous batch from bottom of stack ---
            const batch = [];
            for (const pr of chain) {
              const hasLabel = pr.labels.some(l => l.name === 'queue');
              if (!hasLabel) {
                console.log(`PR #${pr.number} not labeled with 'queue' — stopping batch here`);
                break;
              }

              batch.push({
                number: pr.number,
                head_sha: pr.head.sha,
                head_ref: pr.head.ref,
                base_ref: pr.base.ref,
                title: pr.title
              });
            }

            if (batch.length === 0) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: labeledPr.number,
                body: `**Merge Queue:** No PRs ready to queue. Ensure PRs at the bottom of the stack are labeled with \`queue\`.`
              });
              core.setFailed('No PRs ready');
              return;
            }

            if (!batch.some(b => b.number === labeledPr.number)) {
              const stackOrder = chain.map(p => `#${p.number}`).join(' -> ');
              await github.rest.issues.createComment({
                owner, repo, issue_number: labeledPr.number,
                body: `**Merge Queue:** Cannot queue this PR. PRs below it in the stack must also be labeled with \`queue\`.\n\nStack order: ${stackOrder}`
              });
              core.setFailed('Non-contiguous stack');
              return;
            }

            console.log(`Batch: ${batch.map(b => '#' + b.number).join(', ')}`);
            core.setOutput('batch', JSON.stringify(batch));
            core.setOutput('batch_count', batch.length);

      - name: Checkout repository
        if: steps.discover.outputs.batch_count > 0
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Create batch branch
        if: steps.discover.outputs.batch_count > 0
        id: create-batch
        env:
          BATCH_JSON: ${{ steps.discover.outputs.batch }}
        run: |
          set -euo pipefail

          BATCH_ID="$(date +%s)-${GITHUB_RUN_ID}"
          BRANCH_NAME="mq/${BATCH_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH_NAME}"

          echo "${BATCH_JSON}" | jq -c '.[]' | while read -r pr_info; do
            NUMBER=$(echo "$pr_info" | jq -r '.number')
            HEAD_REF=$(echo "$pr_info" | jq -r '.head_ref')
            HEAD_SHA=$(echo "$pr_info" | jq -r '.head_sha')

            echo "Merging PR #${NUMBER} (${HEAD_REF} @ ${HEAD_SHA})..."
            git fetch origin "${HEAD_REF}"

            ACTUAL_SHA=$(git rev-parse "origin/${HEAD_REF}")
            if [ "${ACTUAL_SHA}" != "${HEAD_SHA}" ]; then
              echo "::error::PR #${NUMBER} head changed: expected ${HEAD_SHA}, got ${ACTUAL_SHA}"
              exit 1
            fi

            git merge --no-ff "origin/${HEAD_REF}" \
              -m "Merge PR #${NUMBER} (head:${HEAD_SHA} ref:${HEAD_REF})"
          done

          git push origin "HEAD:refs/heads/${BRANCH_NAME}"
          echo "branch=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "Batch branch created: ${BRANCH_NAME}"

      - name: Post queued comments
        if: steps.discover.outputs.batch_count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const batch = JSON.parse('${{ steps.discover.outputs.batch }}');
            const branch = '${{ steps.create-batch.outputs.branch }}';
            const prList = batch.map(b => `- #${b.number} (${b.head_ref})`).join('\n');
            for (const entry of batch) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: entry.number,
                body: `**Merge Queue:** Queued in batch \`${branch}\`. CI running.\n\nBatch contents:\n${prList}`
              });
            }

      - name: Trigger CI and wait for completion
        if: steps.discover.outputs.batch_count > 0
        id: ci
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = '${{ steps.create-batch.outputs.branch }}';

            await github.rest.actions.createWorkflowDispatch({
              owner, repo,
              workflow_id: 'ci.yml',
              ref: branch,
              inputs: { ref: branch }
            });
            console.log(`Dispatched CI on ${branch}`);

            await new Promise(r => setTimeout(r, 5000));

            let ciRun = null;
            for (let attempt = 0; attempt < 10; attempt++) {
              const { data: runs } = await github.rest.actions.listWorkflowRuns({
                owner, repo,
                workflow_id: 'ci.yml',
                branch: branch,
                event: 'workflow_dispatch',
                per_page: 5
              });
              if (runs.workflow_runs.length > 0) {
                ciRun = runs.workflow_runs[0];
                break;
              }
              console.log(`Waiting for CI run to appear (attempt ${attempt + 1})...`);
              await new Promise(r => setTimeout(r, 5000));
            }

            if (!ciRun) {
              core.setFailed('CI run did not appear after dispatch');
              return;
            }

            console.log(`Found CI run ${ciRun.id}, polling...`);

            const maxWait = 30 * 60 * 1000;
            const start = Date.now();
            while (Date.now() - start < maxWait) {
              const { data: run } = await github.rest.actions.getWorkflowRun({
                owner, repo, run_id: ciRun.id
              });
              if (run.status === 'completed') {
                console.log(`CI completed: ${run.conclusion}`);
                core.setOutput('run_url', run.html_url);
                if (run.conclusion !== 'success') {
                  core.setFailed(`CI failed: ${run.conclusion}`);
                }
                return;
              }
              console.log(`CI status: ${run.status}...`);
              await new Promise(r => setTimeout(r, 15000));
            }
            core.setFailed('CI timed out after 30 minutes');

  merge:
    needs: enqueue
    if: needs.enqueue.outputs.batch_count > 0 && success()
    runs-on: ubuntu-latest
    steps:
      - name: Fast-forward main
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const batch = JSON.parse('${{ needs.enqueue.outputs.batch }}');
            const batchBranch = '${{ needs.enqueue.outputs.branch }}';
            const defaultBranch = '${{ github.event.repository.default_branch }}';

            const { data: branchRef } = await github.rest.git.getRef({
              owner, repo, ref: `heads/${batchBranch}`
            });
            const batchSha = branchRef.object.sha;

            console.log(`Batch: ${batchBranch} (${batchSha}), PRs: ${batch.map(b => '#' + b.number).join(', ')}`);

            // --- 1. Verify optimistic locks ---
            for (const entry of batch) {
              const { data: pr } = await github.rest.pulls.get({
                owner, repo, pull_number: entry.number
              });
              if (pr.head.sha !== entry.head_sha) {
                core.setFailed(`PR #${entry.number} head changed`);
                return;
              }
            }

            // --- 2. Verify main hasn't diverged ---
            const { data: mainRef } = await github.rest.git.getRef({
              owner, repo, ref: `heads/${defaultBranch}`
            });
            const { data: comparison } = await github.rest.repos.compareCommits({
              owner, repo, base: mainRef.object.sha, head: batchSha
            });
            if (comparison.status !== 'ahead') {
              core.setFailed(`Main diverged (${comparison.status})`);
              return;
            }

            // --- 3. Fast-forward main ---
            await github.rest.git.updateRef({
              owner, repo,
              ref: `heads/${defaultBranch}`,
              sha: batchSha,
              force: false
            });
            console.log(`Fast-forwarded ${defaultBranch} to ${batchSha}`);

            // --- 4. Retarget PRs so GitHub marks them "Merged" ---
            for (const entry of batch) {
              try {
                await github.rest.pulls.update({
                  owner, repo, pull_number: entry.number, base: defaultBranch
                });
                console.log(`Retargeted PR #${entry.number} to ${defaultBranch}`);
              } catch (e) {
                console.log(`Could not retarget PR #${entry.number}: ${e.message}`);
              }
            }

            await new Promise(r => setTimeout(r, 5000));

            // --- 5. Post success + cleanup ---
            for (const entry of batch) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: entry.number,
                body: `**Merge Queue:** Successfully merged to \`${defaultBranch}\`.`
              });
            }

            await github.rest.git.deleteRef({ owner, repo, ref: `heads/${batchBranch}` });

            for (const entry of batch) {
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `heads/${entry.head_ref}` });
              } catch (e) {
                console.log(`Could not delete branch ${entry.head_ref}: ${e.message}`);
              }
            }

  cleanup-on-failure:
    needs: [enqueue, merge]
    if: always() && needs.enqueue.outputs.batch_count > 0 && (needs.enqueue.result == 'failure' || needs.merge.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Notify and cleanup
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const batchJson = `${{ needs.enqueue.outputs.batch }}`;
            const batchBranch = '${{ needs.enqueue.outputs.branch }}';
            const ciRunUrl = '${{ needs.enqueue.outputs.ci_run_url }}';

            if (!batchJson || !batchBranch) return;
            const batch = JSON.parse(batchJson);

            for (const entry of batch) {
              const ciLink = ciRunUrl ? `\n\n[View CI run](${ciRunUrl})` : '';
              await github.rest.issues.createComment({
                owner, repo, issue_number: entry.number,
                body: `**Merge Queue:** Batch failed. Fix the issue and re-add the \`queue\` label to retry.${ciLink}`
              });
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: entry.number, name: 'queue'
              }).catch(() => {});
            }

            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `heads/${batchBranch}` });
            } catch (e) {
              console.log(`Could not delete batch branch: ${e.message}`);
            }
