# Simulates the real CI pipeline. Runs on PRs, main, and merge queue branches.
name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches:
      - "main"
      - "mq/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to run CI on"
        required: true
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Lint check
        run: echo "Linting passed"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Run tests
        run: echo "Tests passed"

  results:
    name: Final Results
    needs: [lint, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ]; then
            echo "CI failed"
            exit 1
          fi
          echo "All checks passed"
