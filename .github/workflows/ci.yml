# CI pipeline — runs real checks on the code.
# PRs that introduce syntax errors or failing tests will fail CI.
name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches:
      - "main"
      - "mq/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to run CI on"
        required: true
        type: string
      delay:
        description: "Seconds to sleep after tests (for integration testing)"
        required: false
        default: "0"
        type: string

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Syntax check
        run: |
          # Check all .py files for syntax errors
          find . -name '*.py' -not -path './.venv/*' -not -path './merge_queue.egg-info/*' | \
            xargs python -m py_compile

      - name: Run tests with coverage
        run: pytest tests/ -x -q --no-header --cov=merge_queue --cov-report=term-missing --cov-fail-under=85

      - name: CI delay
        run: |
          # Configurable delay for integration testing (default 0)
          DELAY="${{ inputs.delay || '0' }}"
          if [ "$DELAY" -gt 0 ] 2>/dev/null; then
            echo "Sleeping ${DELAY}s for integration test..."
            sleep "$DELAY"
          fi

  results:
    name: Final Results
    needs: [check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.check.result }}" != "success" ]; then
            echo "CI failed"
            exit 1
          fi
          echo "All checks passed"
