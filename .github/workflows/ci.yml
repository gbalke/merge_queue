# CI pipeline — runs real checks on the code.
# PRs that introduce syntax errors or failing tests will fail CI.
name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches:
      - "main"
      - "mq/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to run CI on"
        required: true
        type: string

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Syntax check
        run: python -m py_compile hello.py

      - name: Run tests
        run: pytest tests/ -x -q --no-header --override-ini="addopts="

  results:
    name: Final Results
    needs: [check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.check.result }}" != "success" ]; then
            echo "CI failed"
            exit 1
          fi
          echo "All checks passed"
