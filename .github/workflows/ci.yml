# CI pipeline — lint, format, test with coverage.
# Jobs call scripts in ci/ so local and CI run identical checks.
name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches:
      - "main"
      - "mq/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to run CI on"
        required: true
        type: string
      delay:
        description: "Seconds to sleep after tests (for integration testing)"
        required: false
        default: "0"
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ci/lint

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Format check
        run: ci/format

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        run: ci/test

      - name: CI delay
        run: |
          DELAY="${{ inputs.delay || '0' }}"
          if [ "$DELAY" -gt 0 ] 2>/dev/null; then
            echo "Sleeping ${DELAY}s for integration test..."
            sleep "$DELAY"
          fi

  results:
    name: Final Results
    needs: [lint, format, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.format.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ]; then
            echo "CI failed"
            exit 1
          fi
          echo "All checks passed"
