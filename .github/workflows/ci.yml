# CI pipeline — lint, format, test with coverage.
name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches:
      - "main"
      - "mq/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to run CI on"
        required: true
        type: string
      delay:
        description: "Seconds to sleep after tests (for integration testing)"
        required: false
        default: "0"
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Syntax check
        run: |
          find . -name '*.py' -not -path './.venv/*' -not -path './merge_queue.egg-info/*' | \
            xargs python -m py_compile

      - name: Ruff lint
        run: ruff check merge_queue/ tests/

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check merge_queue/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ -x -q --no-header

      - name: CI delay
        run: |
          DELAY="${{ inputs.delay || '0' }}"
          if [ "$DELAY" -gt 0 ] 2>/dev/null; then
            echo "Sleeping ${DELAY}s for integration test..."
            sleep "$DELAY"
          fi

  results:
    name: Final Results
    needs: [lint, format, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.format.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ]; then
            echo "CI failed"
            exit 1
          fi
          echo "All checks passed"
