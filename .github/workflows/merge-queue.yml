name: Merge Queue

on:
  pull_request:
    types: [labeled, unlabeled, synchronize]
  workflow_dispatch:
    inputs:
      command:
        type: choice
        options: [process, check-rules, status]
        default: process

# Single concurrency group — all MQ operations are serialized.
# This prevents double-processing when multiple PRs are labeled simultaneously.
# _sync_missing_prs picks up any PRs whose enqueue was cancelled.
concurrency:
  group: merge-queue
  cancel-in-progress: false

jobs:
  run:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.action == 'synchronize' ||
      github.event.label.name == 'queue' ||
      github.event.label.name == 're-test' ||
      github.event.label.name == 'hotfix' ||
      github.event.label.name == 'break-glass'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install merge queue
        run: pip install ".[dev]"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine command
        id: cmd
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "cmd=${{ inputs.command }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.action }}" = "labeled" ] && [ "${{ github.event.label.name }}" = "re-test" ]; then
            echo "cmd=retest ${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.action }}" = "labeled" ] && [ "${{ github.event.label.name }}" = "hotfix" ]; then
            echo "cmd=hotfix ${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.action }}" = "labeled" ] && [ "${{ github.event.label.name }}" = "break-glass" ]; then
            echo "cmd=break-glass ${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.action }}" = "labeled" ]; then
            echo "cmd=enqueue ${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.action }}" = "synchronize" ]; then
            # Force-push on a PR that has the 'queue' label — re-enqueue to update head_sha.
            # If the PR doesn't have the 'queue' label, skip (no command).
            HAS_QUEUE=$(echo '${{ toJSON(github.event.pull_request.labels.*.name) }}' | grep -c '"queue"' || true)
            if [ "$HAS_QUEUE" -gt 0 ]; then
              echo "cmd=enqueue ${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            fi
          elif [ "${{ github.event.action }}" = "unlabeled" ]; then
            echo "cmd=abort ${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run merge queue
        run: python -m merge_queue $MQ_CMD
        env:
          MQ_CMD: ${{ steps.cmd.outputs.cmd }}
          GITHUB_TOKEN: ${{ github.token }}
          MQ_ADMIN_TOKEN: ${{ secrets.MQ_ADMIN_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MQ_SENDER: ${{ github.event.sender.login }}
          GITHUB_EVENT_TIME: ${{ github.event.pull_request.updated_at }}
          MQ_METRICS_USER: ${{ secrets.MQ_METRICS_USER }}
          MQ_METRICS_TOKEN: ${{ secrets.MQ_METRICS_TOKEN }}

      - name: Write queue status to job summary
        if: always()
        run: python -m merge_queue summary >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MQ_ADMIN_TOKEN: ${{ secrets.MQ_ADMIN_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
