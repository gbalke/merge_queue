name: Merge Queue

on:
  pull_request:
    types: [labeled, unlabeled]
  workflow_dispatch:
    inputs:
      command:
        type: choice
        options: [process, check-rules, status]
        default: process

concurrency:
  group: merge-queue
  cancel-in-progress: false

jobs:
  run:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'queue' ||
      github.event.label.name == 're-test'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install merge queue
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Install from the PR branch so new MQ code is available immediately.
            # Avoids bootstrap problem where main doesn't have the PR's changes.
            # Uses non-editable install so restoring main's tree doesn't affect it.
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            echo "Installing merge-queue from PR head: ${HEAD_SHA:0:8}"
            git stash
            git checkout "$HEAD_SHA" 2>/dev/null
            pip install ".[dev]"
            git checkout "${{ github.event.repository.default_branch }}"
            git stash pop 2>/dev/null || true
          else
            pip install ".[dev]"
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine command
        id: cmd
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "cmd=${{ inputs.command }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.action }}" = "labeled" ] && [ "${{ github.event.label.name }}" = "re-test" ]; then
            echo "cmd=retest ${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.action }}" = "labeled" ]; then
            echo "cmd=enqueue ${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.action }}" = "unlabeled" ]; then
            echo "cmd=abort ${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run merge queue
        run: python -m merge_queue ${{ steps.cmd.outputs.cmd }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MQ_ADMIN_TOKEN: ${{ secrets.MQ_ADMIN_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Write queue status to job summary
        if: always()
        run: python -m merge_queue summary >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MQ_ADMIN_TOKEN: ${{ secrets.MQ_ADMIN_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
