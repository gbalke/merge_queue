name: "Merge Queue: Merge"

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["mq/**"]

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read

concurrency:
  group: merge-queue
  cancel-in-progress: false

jobs:
  merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Parse batch and merge
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const batchBranch = context.payload.workflow_run.head_branch;
            const batchSha = context.payload.workflow_run.head_sha;
            const defaultBranch = context.payload.repository.default_branch;

            console.log(`Processing successful CI for batch branch: ${batchBranch} (${batchSha})`);

            // --- 1. Get main SHA ---
            const { data: mainRef } = await github.rest.git.getRef({
              owner, repo, ref: `heads/${defaultBranch}`
            });
            const mainSha = mainRef.object.sha;

            // --- 2. Walk merge commits to extract batch metadata ---
            const prEntries = [];
            let current = batchSha;
            let safety = 0;
            while (current !== mainSha && safety < 50) {
              safety++;
              const { data: commit } = await github.rest.git.getCommit({
                owner, repo, commit_sha: current
              });

              if (commit.parents.length === 2) {
                // This is a merge commit
                const match = commit.message.match(/Merge PR #(\d+) \(head:([a-f0-9]+) ref:([^\)]+)\)/);
                if (match) {
                  prEntries.unshift({
                    number: parseInt(match[1]),
                    head_sha: match[2],
                    head_ref: match[3],
                    merge_sha: current
                  });
                }
              }

              if (commit.parents.length === 0) break;
              current = commit.parents[0].sha;
            }

            if (prEntries.length === 0) {
              core.setFailed(`No PR merge commits found in batch branch ${batchBranch}`);
              return;
            }

            console.log(`Batch contains PRs: ${prEntries.map(e => '#' + e.number).join(', ')}`);

            // --- 3. Verify optimistic locks ---
            for (const entry of prEntries) {
              const { data: pr } = await github.rest.pulls.get({
                owner, repo, pull_number: entry.number
              });

              if (pr.head.sha !== entry.head_sha) {
                core.setFailed(`PR #${entry.number} head changed: expected ${entry.head_sha}, now ${pr.head.sha}`);

                // Notify all PRs and clean up
                for (const e of prEntries) {
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: e.number,
                    body: `**Merge Queue:** Batch aborted — PR #${entry.number} was updated while in queue. Remove and re-add the \`queue\` label to retry.`
                  });
                  await github.rest.issues.removeLabel({
                    owner, repo, issue_number: e.number, name: 'queue'
                  }).catch(() => {});
                }

                await github.rest.git.deleteRef({
                  owner, repo, ref: `heads/${batchBranch}`
                });
                return;
              }
            }

            // --- 4. Verify main hasn't diverged ---
            const { data: comparison } = await github.rest.repos.compareCommits({
              owner, repo, base: mainSha, head: batchSha
            });

            if (comparison.status !== 'ahead') {
              core.setFailed(`Main branch has diverged (status: ${comparison.status}). Batch is stale.`);

              for (const entry of prEntries) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: entry.number,
                  body: `**Merge Queue:** Batch aborted — \`${defaultBranch}\` moved forward while CI was running. Remove and re-add the \`queue\` label to retry.`
                });
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: entry.number, name: 'queue'
                }).catch(() => {});
              }

              await github.rest.git.deleteRef({
                owner, repo, ref: `heads/${batchBranch}`
              });
              return;
            }

            // --- 5. Fast-forward main ---
            try {
              await github.rest.git.updateRef({
                owner, repo,
                ref: `heads/${defaultBranch}`,
                sha: batchSha,
                force: false
              });
              console.log(`Fast-forwarded ${defaultBranch} to ${batchSha}`);
            } catch (e) {
              core.setFailed(`Failed to fast-forward ${defaultBranch}: ${e.message}`);

              for (const entry of prEntries) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: entry.number,
                  body: `**Merge Queue:** Batch aborted — failed to update \`${defaultBranch}\`. This usually means another commit landed. Remove and re-add the \`queue\` label to retry.`
                });
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: entry.number, name: 'queue'
                }).catch(() => {});
              }

              await github.rest.git.deleteRef({
                owner, repo, ref: `heads/${batchBranch}`
              });
              return;
            }

            // --- 6. Retarget PRs to default branch so GitHub marks them as "Merged" ---
            for (const entry of prEntries) {
              try {
                await github.rest.pulls.update({
                  owner, repo,
                  pull_number: entry.number,
                  base: defaultBranch
                });
                console.log(`Retargeted PR #${entry.number} to ${defaultBranch}`);
              } catch (e) {
                // PR may already be closed/merged
                console.log(`Could not retarget PR #${entry.number}: ${e.message}`);
              }
            }

            // Small delay for GitHub to process the retarget + reachability
            await new Promise(r => setTimeout(r, 3000));

            // --- 7. Post success comments ---
            for (const entry of prEntries) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: entry.number,
                body: `**Merge Queue:** Successfully merged to \`${defaultBranch}\`.`
              });
            }

            // --- 8. Clean up batch branch ---
            await github.rest.git.deleteRef({
              owner, repo, ref: `heads/${batchBranch}`
            });
            console.log(`Deleted batch branch ${batchBranch}`);

            // --- 9. Clean up PR head branches ---
            for (const entry of prEntries) {
              try {
                await github.rest.git.deleteRef({
                  owner, repo, ref: `heads/${entry.head_ref}`
                });
                console.log(`Deleted PR branch ${entry.head_ref}`);
              } catch (e) {
                console.log(`Could not delete branch ${entry.head_ref}: ${e.message}`);
              }
            }

  handle-failure:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Notify and cleanup
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const batchBranch = context.payload.workflow_run.head_branch;
            const batchSha = context.payload.workflow_run.head_sha;
            const defaultBranch = context.payload.repository.default_branch;
            const runUrl = context.payload.workflow_run.html_url;

            console.log(`CI failed for batch branch: ${batchBranch}`);

            // Parse batch metadata from merge commits
            const { data: mainRef } = await github.rest.git.getRef({
              owner, repo, ref: `heads/${defaultBranch}`
            });
            const mainSha = mainRef.object.sha;

            const prEntries = [];
            let current = batchSha;
            let safety = 0;
            while (current !== mainSha && safety < 50) {
              safety++;
              const { data: commit } = await github.rest.git.getCommit({
                owner, repo, commit_sha: current
              });

              if (commit.parents.length === 2) {
                const match = commit.message.match(/Merge PR #(\d+) \(head:([a-f0-9]+) ref:([^\)]+)\)/);
                if (match) {
                  prEntries.unshift({
                    number: parseInt(match[1]),
                    head_sha: match[2],
                    head_ref: match[3]
                  });
                }
              }

              if (commit.parents.length === 0) break;
              current = commit.parents[0].sha;
            }

            // Notify all PRs
            for (const entry of prEntries) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: entry.number,
                body: `**Merge Queue:** Batch CI failed. The batch has been removed from the queue.\n\n[View CI run](${runUrl})\n\nFix the issue and re-add the \`queue\` label to retry.`
              });
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: entry.number, name: 'queue'
              }).catch(() => {});
            }

            // Delete batch branch
            await github.rest.git.deleteRef({
              owner, repo, ref: `heads/${batchBranch}`
            });
            console.log(`Deleted batch branch ${batchBranch}`);
